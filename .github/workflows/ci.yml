name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # Tests mock R2 and Anthropic, so these env vars just satisfy settings validation.
        env:
          ANTHROPIC_API_KEY: test-key
          R2_ACCOUNT_ID: test-account
          R2_ACCESS_KEY_ID: test-access
          R2_SECRET_ACCESS_KEY: test-secret
          R2_BUCKET_NAME: test-bucket
        run: pytest -q

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t atlas-people-context-uploader-backend ./backend

      - name: Build frontend image
        run: docker build -t atlas-people-context-uploader-frontend ./frontend
